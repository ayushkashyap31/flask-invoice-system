<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        {% block title %}
        Invoice Management System
        {% endblock %}

    </title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        :root {
            color-scheme: dark;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background-color: #0f172a;
            background-image:
                radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 28%),
                radial-gradient(circle at bottom right, rgba(16,185,129,0.12), transparent 22%),
                linear-gradient(180deg, #0f172a 0%, #111827 100%);
            color: #e5e7eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .navbar {
            background: rgba(15,23,42,0.95) !important;
            border-bottom: 1px solid rgba(148,163,184,0.12);
            box-shadow: 0 20px 45px rgba(15,23,42,0.25);
        }

        .navbar-item {

            position: relative;

            border-radius: 8px;

        }

        .navbar-link {
            color: #e5e7eb !important;
            transition: color 0.25s ease, background-color 0.25s ease;
            position: relative;
        }

        .navbar-item::after {
            content: "";
            position: absolute;
            left: 0;
            right: auto;
            bottom: 10px;
            width:0;
            height: 1.5px;
            background: #60a5fa;
            border-radius: 9999px;
            transition: width 0.25s ease;
        }

        .navbar-item:hover::after,
        .navbar-item.is-active::after {
            width: 100%;
        }

        .navbar-item:hover {

            color: white !important;

            background: rgba(
                59,
                130,
                246,
                0.18
            ) !important;

            border-radius: 0.75rem;

            box-shadow:
                0 0 15px rgba(
                    59,
                    130,
                    246,
                    0.25
                );

        }

        .navbar-item.is-active {

            color: white !important;

            background: rgba(
                59,
                130,
                246,
                0.25
            ) !important;

            border-radius: 0.75rem;

        }

        .navbar-brand .navbar-item {
            font-weight: 700;
        }

        .button .icon,
        .button .icon i,
        .button .icon svg {

            color: white !important;

            opacity: 1 !important;

            font-size: 1rem;

        }

        .box {
            background: rgba(15,23,42,0.96);
            border: 1px solid rgba(148,163,184,0.18);
            border-radius: 1.25rem;
            box-shadow: 0 18px 42px rgba(15,23,42,0.28);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .box:hover {
            transform: translateY(-6px);
            box-shadow: 0 34px 72px rgba(15,23,42,0.34);
            border-color: rgba(96,165,250,0.28);
        }

        .box .title,
        .box .subtitle,
        .box .heading,
        .box .label,
        .box strong {
            color: #f8fafc !important;
        }

        .title,
        .subtitle,
        .label,
        strong,
        .heading {
            color: #f8fafc !important;
        }

        .title.is-5,
        .subtitle,
        .heading {
            letter-spacing: 0.02em;
        }

        .table-container {
            overflow: hidden;
            border-radius: 1rem;
            box-shadow: 0 22px 46px rgba(15,23,42,0.26);
            margin-bottom: 1rem;
        }

        .table {
            background: rgba(15,23,42,0.9);
            color: #e5e7eb;
        }

        .table th {
            background: rgba(31,41,55,0.95);
            color: #cbd5e1;
            border-bottom: 1px solid rgba(148,163,184,0.12);
        }

        .table td {
            color: #d1d5db;
            border-top: none;
        }

        .table tbody tr {
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .table tbody tr {
    transition: all 0.25s ease;
}

        .table tbody tr:hover {
            transform: translateX(4px);
        }

        .table tbody tr:hover td {

            background: rgba(
                59,
                130,
                246,
                0.10
            ) !important;

            color: white !important;

            /* box-shadow:
                inset 4px 0 0 #3b82f6; */

        }

        .input,
        .select select,
        .textarea {
            background-color: #1f2937;
            border-color: #334155;
            color: #e5e7eb;
        }

        .input::placeholder,
        .textarea::placeholder {
            color: #94a3b8;
        }

        .tag {
            background-color: rgba(71,85,105,0.18);
            color: #e5e7eb;
            border: 1px solid rgba(148,163,184,0.12);
            border-radius: 9999px;
            box-shadow: inset 0 1px 4px rgba(15,23,42,0.2);
        }

        .tag.is-success {
            background: rgba(16,185,129,0.15);
            color: #a7f3d0;
            border-color: rgba(16,185,129,0.28);
        }

        .tag.is-danger {
            background: rgba(239,68,68,0.15);
            color: #fecaca;
            border-color: rgba(239,68,68,0.28);
        }

        .tag.is-warning {
            background: rgba(245,158,11,0.15);
            color: #fde68a;
            border-color: rgba(245,158,11,0.28);
        }

        .tag.is-info {
            background: rgba(56,189,248,0.15);
            color: #bae6fd;
            border-color: rgba(56,189,248,0.28);
        }

        .button {
            border-radius: 0.9rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease;
            box-shadow: 0 12px 24px rgba(15,23,42,0.12);
        }

        .button:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 18px 32px rgba(15,23,42,0.2);
        }

        .button.is-primary {
            background-color: #2563eb;
            border-color: #2563eb;
            color: white;
        }

        .button.is-info {
            background-color: #0ea5e9;
            border-color: #0ea5e9;
            color: white;
        }

        .button.is-success {
            background-color: #16a34a;
            border-color: #16a34a;
            color: white;
        }

        .button.is-warning {
            background-color: #d97706;
            border-color: #d97706;
            color: white;
        }

        .button.is-light {
            background-color: rgba(255,255,255,0.08);
            color: #f8fafc;
            border-color: rgba(255,255,255,0.12);
        }

        .button.is-light:hover {
            background-color: rgba(255,255,255,0.12);
        }

        .content-wrapper {
            padding-top: 1.5rem;
            padding-bottom: 2rem;
        }

        .section {
            padding-top: 1.5rem;
            padding-bottom: 1.5rem;
        }

        .level {
            align-items: center;
        }

        .dashboard-card .title {
            font-size: 2.5rem;
        }

        .dashboard-card .heading {
            margin-bottom: 1rem;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #94a3b8;
        }

        .dashboard-card .icon {
            font-size: 1.4rem;
            color: #60a5fa;
        }

        .card-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #cbd5e1;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .fab-button {
            position: fixed;
            right: 1.5rem;
            bottom: 1.5rem;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 30px 50px rgba(15,23,42,0.35);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .fab-button:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 36px 60px rgba(15,23,42,0.38);
        }

        .message.is-info {
            background: rgba(59,130,246,0.08);
            color: #dbeafe;
            border-color: rgba(59,130,246,0.2);
        }

        .message-body {
            color: #e2e8f0;
        }

    </style>

</head>

<body>

    <nav
        class="navbar"
        role="navigation">

        <div class="container">

            <div class="navbar-brand">

                <a class="navbar-item">

                    <span class="icon has-text-info">
                        <i class="fas fa-file-invoice fa-lg"></i>
                    </span>

                    <span class="has-text-weight-semibold ml-2">
                        Invoice Management System
                    </span>

                </a>

            </div>

            <div class="navbar-menu">

                <div class="navbar-start">

                    <a
                        class="navbar-item {% if request.path == '/' %}is-active{% endif %}"
                        href="/">

                        <span class="icon">
                            <i class="fas fa-chart-line"></i>
                        </span>

                        <span>
                            Dashboard
                        </span>

                    </a>

                    <a
                        class="navbar-item {% if request.path.startswith('/customers') %}is-active{% endif %}"
                        href="/customers">

                        <span class="icon">
                            <i class="fas fa-users"></i>
                        </span>

                        <span>
                            Customers
                        </span>

                    </a>

                    <a
                        class="navbar-item {% if request.path.startswith('/items') %}is-active{% endif %}"
                        href="/items">

                        <span class="icon">
                            <i class="fas fa-box"></i>
                        </span>

                        <span>
                            Items
                        </span>

                    </a>

                    <a
                        class="navbar-item {% if request.path.startswith('/invoices') %}is-active{% endif %}"
                        href="/invoices">

                        <span class="icon">
                            <i class="fas fa-file-invoice-dollar"></i>
                        </span>

                        <span>
                            Invoices
                        </span>

                    </a>

                    <a
                        class="navbar-item {% if request.path.startswith('/notifications') %}is-active{% endif %}"
                        href="/notifications">

                        <span class="icon">
                            <i class="fas fa-bell"></i>
                        </span>

                        <span>
                            Notifications
                        </span>

                    </a>

                </div>

            </div>

        </div>

    </nav>

    <section class="section">

        <div class="container content-wrapper">

            {% with messages = get_flashed_messages(with_categories=true) %}

                {% if messages %}

                    {% for category, message in messages %}

                        <div
                            class="notification
                            {% if category == 'success' %}
                                is-success
                            {% elif category == 'danger' %}
                                is-danger
                            {% elif category == 'warning' %}
                                is-warning
                            {% else %}
                                is-info
                            {% endif %}
                        ">
                            <button class="delete"></button>

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}

            {% endwith %}

            {% block content %}
            {% endblock %}

        </div>

    </section>

    <a
        class="fab-button"
        href="/invoices/add"
        aria-label="Create Invoice">
        <i class="fas fa-plus"></i>
    </a>

<script>

document.addEventListener(
    "DOMContentLoaded",
    () => {

        document
            .querySelectorAll(".notification .delete")
            .forEach(button => {

                button.addEventListener(
                    "click",
                    () => {

                        button.parentElement.remove();

                    }
                );

            });

    }
);

</script>
</body>

</html>
