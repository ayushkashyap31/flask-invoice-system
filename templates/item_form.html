{% extends "base.html" %}

{% block title %}
Add Item
{% endblock %}

{% block content %}

<div class="columns is-centered">

    <div class="column is-half">

        <div class="box">

            <h1 class="title">
                Add Item
            </h1>

            <form method="POST">

                <div class="field">

                    <label class="label">
                        Item Name
                    </label>

                    <div class="control">

                        <input
                            class="input"
                            type="text"
                            name="item_name"
                            placeholder="Enter item name"
                            required>

                    </div>

                </div>

                <div class="field">

                    <label class="label">
                        Price
                    </label>

                    <div class="control">

                        <input
                            class="input"
                            type="number"
                            step="0.01"
                            name="price"
                            placeholder="Enter price"
                            required>

                    </div>

                </div>

                <div class="field is-grouped">

                    <div class="control">

                        <button
                            type="submit"
                            class="button is-primary">

                            <span class="icon">
                                <i class="fas fa-save"></i>
                            </span>

                            <span>
                                Save Item
                            </span>

                        </button>

                    </div>

                    <div class="control">

                        <a
                            href="/items"
                            class="button is-light">

                            Cancel

                        </a>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
